<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Retro dark space background -->
  <rect width="32" height="32" rx="4" fill="#120224"/>
  
  <!-- Glowing neon border -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.8"/>
  
  <!-- Letter G (Cyan) -->
  <rect x="5" y="11" width="2" height="10" fill="#67e8f9"/>
  <rect x="7" y="11" width="4" height="2" fill="#67e8f9"/>
  <rect x="7" y="19" width="4" height="2" fill="#67e8f9"/>
  <rect x="9" y="15" width="2" height="6" fill="#67e8f9"/>
  <rect x="7" y="15" width="2" height="2" fill="#67e8f9"/>
  
  <!-- Letter n (Pink) -->
  <rect x="13" y="14" width="2" height="7" fill="#f472b6"/>
  <rect x="15" y="14" width="2" height="2" fill="#f472b6"/>
  <rect x="17" y="15" width="2" height="6" fill="#f472b6"/>
  
  <!-- Letter J (Cyan) -->
  <rect x="21" y="11" width="6" height="2" fill="#67e8f9"/>
  <rect x="25" y="13" width="2" height="6" fill="#67e8f9"/>
  <rect x="23" y="19" width="4" height="2" fill="#67e8f9"/>
  <rect x="21" y="17" width="2" height="2" fill="#67e8f9"/>
</svg>
